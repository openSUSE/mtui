default:
  image: rust:latest

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTFLAGS: "-D warnings"

stages:
  - check
  - test

# The mtui-hosts SSH integration tests run against an in-process russh server
# that accepts any offered public key, but the client is pubkey/agent-only and
# offers keys from the SSH agent or ~/.ssh/id_*. CI runners have neither, so an
# ephemeral keypair is generated to give the client something to authenticate
# with. Reused by every job that runs the SSH integration suite.
.ssh_fixture: &ssh_fixture
  - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  - ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519 -q

cache:
  key:
    files:
      - Cargo.lock
  paths:
    - .cargo/
    - target/

fmt:
  stage: check
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all --check

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

test:
  stage: test
  before_script:
    - *ssh_fixture
  script:
    - cargo build --workspace
    - cargo test --workspace

coverage:
  stage: test
  before_script:
    - *ssh_fixture
    - rustup component add llvm-tools-preview
    - cargo install cargo-llvm-cov --locked
  script:
    - cargo llvm-cov --workspace --cobertura --output-path coverage.cobertura.xml
    - cargo llvm-cov report --summary-only
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml
