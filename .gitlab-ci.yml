default:
  image: rust:latest

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTFLAGS: "-D warnings"

stages:
  - check
  - test
  - release

# The mtui-hosts SSH integration tests run against an in-process russh server
# that accepts any offered public key, but the client is pubkey/agent-only and
# offers keys from the SSH agent or ~/.ssh/id_*. CI runners have neither, so an
# ephemeral keypair is generated to give the client something to authenticate
# with. Reused by every job that runs the SSH integration suite.
.ssh_fixture: &ssh_fixture
  - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  - ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519 -q

cache:
  key:
    files:
      - Cargo.lock
  paths:
    - .cargo/
    - target/

fmt:
  stage: check
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all --check

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

# Catch feature-gate rot: code that only compiles under the default feature set,
# or breaks when the optional features (mcp/notify/shell) are toggled. Bounding
# the two extremes (--no-default-features and --all-features) exercises every
# gate; RUSTFLAGS=-D warnings (from variables:) keeps gated code warning-clean.
# Compile-only on purpose: the default `test` job covers behavior, and a full
# --all-features test run roughly doubles an already long suite for little added
# signal beyond compilation.
feature-matrix:
  stage: check
  script:
    - cargo build --workspace --no-default-features
    - cargo build --workspace --all-features

test:
  stage: test
  before_script:
    - *ssh_fixture
  script:
    - cargo build --workspace
    - cargo test --workspace

# The MCP security integration tests (deny-list filtering, tool-surface
# snapshots that keep local-shell off the wire, and mcp_jobs resource caps) are
# gated behind `-F mcp`, so the default `cargo test --workspace` above never runs
# them and `feature-matrix` only *builds* them. Test just this crate under `mcp`
# to enforce those trust boundaries continuously, without relinking the whole
# axum/rmcp tree that a full --all-features test run would (see AGENTS.md DoD).
test-mcp:
  stage: test
  script:
    - cargo test -p mtui-mcp -F mcp

coverage:
  stage: test
  before_script:
    - *ssh_fixture
    - rustup component add llvm-tools-preview
    - cargo install cargo-llvm-cov --locked
  script:
    - cargo llvm-cov --workspace --cobertura --output-path coverage.cobertura.xml
    - cargo llvm-cov report --summary-only
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml

# --- Release -----------------------------------------------------------------
# Tag-triggered only: on a `vMAJOR.MINOR.PATCH` tag, cross-compile both binaries
# to static musl targets, package each into a versioned tarball (+ .sha256) via
# `cargo xtask package`, then publish a GitLab Release with every tarball and a
# combined SHA256SUMS attached. Branch/MR pipelines never enter the `release`
# stage (each job carries the same semver-tag `rules:`), so the heavy cross-build
# stays off normal CI.
.release_rules: &release_rules
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

# Build + package one static target. `cross` (prebuilt Docker images) handles the
# aarch64 musl linker uniformly with x86_64, so it needs the docker:dind service.
# GIT_DEPTH: 0 makes GitLab's managed checkout a full clone *with tags* (and the
# pipeline runs on the tag ref itself), so build.rs's `git describe --tags`
# resolves the release tag (e.g. `v1.2.0`) instead of degrading to a bare SHA. We
# rely on that managed checkout rather than a manual `git fetch`, which would
# re-hit HTTPS without the runner's injected internal-CA trust and fail on
# gitlab.suse.de's internal certificate.
build-release:
  stage: release
  image: rust:latest
  services:
    - docker:dind
  variables:
    GIT_DEPTH: 0
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  parallel:
    matrix:
      - TARGET:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
  <<: *release_rules
  before_script:
    # Docker CLI for `cross` to talk to the dind daemon.
    - apt-get update && apt-get install -y --no-install-recommends docker.io
    - cargo install cross --locked
  script:
    - cross build --release --target "$TARGET" -p mtui-cli -p mtui-mcp --features mtui-mcp/mcp
    # A musl build must be fully static; assert it so a regression fails the job.
    - file "target/$TARGET/release/mtui" | grep -q "statically linked"
    - cargo xtask package --version "$CI_COMMIT_TAG" --target "$TARGET"
  artifacts:
    name: "mtui-rs-$CI_COMMIT_TAG-$TARGET"
    paths:
      - dist/release/mtui-rs-$CI_COMMIT_TAG-$TARGET.tar.gz
      - dist/release/mtui-rs-$CI_COMMIT_TAG-$TARGET.tar.gz.sha256
    expire_in: never

# Fan in every build-release matrix job, combine their per-tarball checksums into
# one SHA256SUMS, and publish the GitLab Release. Release assets are linked to the
# permanent job-artifact download URLs (the release-cli image has no artifact of
# its own to attach, so it references the build-release artifacts by URL).
publish-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-release
      artifacts: true
  <<: *release_rules
  variables:
    # Kept in sync with the build-release matrix; drives both the SHA256SUMS
    # fan-in check and the per-target asset-link job names below.
    TARGETS: "x86_64-unknown-linux-musl aarch64-unknown-linux-musl"
  script:
    - cd dist/release
    # One combined manifest over all per-target tarballs (each .sha256 already
    # holds a `<hash>  <name>` line, so concatenation is a valid SHA256SUMS).
    - cat *.tar.gz.sha256 > SHA256SUMS
    - |
      # Build the `release-cli` asset-link flags. Each tarball is linked to the
      # raw job-artifact URL of the *specific* matrix leg that produced it — the
      # matrix job name is `build-release: [<target>]`, url-encoded in the ?job=
      # query. SHA256SUMS is linked to this publish-release job's own artifact.
      links=""
      for t in $TARGETS; do
        f="mtui-rs-${CI_COMMIT_TAG}-${t}.tar.gz"
        job=$(printf 'build-release: [%s]' "$t" | sed 's/ /%20/g; s/\[/%5B/g; s/\]/%5D/g')
        url="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/release/${f}?job=${job}"
        links="$links --assets-link {\"name\":\"${f}\",\"url\":\"${url}\"}"
      done
      sums_url="${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/release/SHA256SUMS?job=publish-release"
      links="$links --assets-link {\"name\":\"SHA256SUMS\",\"url\":\"${sums_url}\"}"
      echo "$links" > .links
    - |
      release-cli create \
        --name "mtui-rs $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "Automated release for $CI_COMMIT_TAG. Verify downloads with SHA256SUMS." \
        $(cat .links)
  artifacts:
    paths:
      - dist/release/SHA256SUMS
    expire_in: never
