include:
  # Upstream Renovate runner templates (pinned via Renovate's gitlabci-include
  # manager). They define the `renovate` and `renovate-config-validator` jobs we
  # override below for the gitlab.suse.de environment.
  - remote: https://gitlab.com/renovate-bot/renovate-runner/-/raw/main/templates/renovate.gitlab-ci.yml
  - remote: https://gitlab.com/renovate-bot/renovate-runner/-/raw/main/templates/renovate-config-validator.gitlab-ci.yml

default:
  image: rust:latest

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  # NB: RUSTFLAGS="-D warnings" is set per-job (see .deny_warnings) rather than
  # globally: as a global it would also apply while `cargo install`-ing tooling
  # (e.g. cargo-llvm-cov in `coverage`), where an upstream dependency emitting a
  # warning would fail the install for reasons unrelated to our code.
  # Renovate config (path inside the repo).
  RENOVATE_CONFIG_FILE: ".gitlab/renovate.json"
  # Restrict Renovate to this project; never autodiscover or onboard others.
  RENOVATE_EXTRA_FLAGS: "--autodiscover=false --onboarding=false"
  RENOVATE_REPOSITORIES: "$CI_PROJECT_PATH"

stages:
  - check
  - test
  # Schedule-only `renovate` job (upstream template defaults to `deploy`).
  - deploy

# The mtui-hosts SSH integration tests run against an in-process russh server
# that accepts any offered public key, but the client is pubkey/agent-only and
# offers keys from the SSH agent or ~/.ssh/id_*. CI runners have neither, so an
# ephemeral keypair is generated to give the client something to authenticate
# with. Reused by every job that runs the SSH integration suite.
.ssh_fixture: &ssh_fixture
  - mkdir -p ~/.ssh && chmod 700 ~/.ssh
  - ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519 -q

# `svn` is a runtime dependency (testreport checkout). A handful of tests drive a
# real *local* `file://` repo and skip cleanly when the binary is absent; the
# stock `rust:latest` image has no `svn`, so install it to keep those paths
# covered. Reused by every job whose suite exercises the SVN checkout path.
.svn_fixture: &svn_fixture
  - apt-get update -qq && apt-get install -y -qq subversion

# Turn warnings into errors for jobs that compile our workspace, mirroring the
# local DoD. Kept off the global `variables:` so it never leaks into `cargo
# install` of CI tooling (see the note above `variables:`).
.deny_warnings:
  variables:
    RUSTFLAGS: "-D warnings"

# Schedule pipelines exist solely to run Renovate; the build/test suite carries
# no signal there (nothing changed since the last push pipeline). Skip these
# jobs on schedule so a dependency scan doesn't drag a full workspace compile
# with it, while keeping them on pushes and merge requests.
.not_on_schedule:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success

cache:
  key:
    files:
      - Cargo.lock
  paths:
    - .cargo/
    - target/

fmt:
  stage: check
  extends: .not_on_schedule
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all --check

clippy:
  stage: check
  extends:
    - .deny_warnings
    - .not_on_schedule
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --workspace --all-targets -- -D warnings

# Catch feature-gate rot: code that only compiles under the default feature set,
# or breaks when the optional features (mcp/notify/shell) are toggled. Bounding
# the two extremes (--no-default-features and --all-features) exercises every
# gate; RUSTFLAGS=-D warnings (via .deny_warnings) keeps gated code warning-clean.
# Compile-only on purpose: the default `test` job covers behavior, and a full
# --all-features test run roughly doubles an already long suite for little added
# signal beyond compilation.
feature-matrix:
  stage: check
  extends:
    - .deny_warnings
    - .not_on_schedule
  script:
    - cargo build --workspace --no-default-features
    - cargo build --workspace --all-features

test:
  stage: test
  extends:
    - .deny_warnings
    - .not_on_schedule
  before_script:
    - *ssh_fixture
    - *svn_fixture
  script:
    - cargo build --workspace
    - cargo test --workspace

# The MCP security integration tests (deny-list filtering, tool-surface
# snapshots that keep local-shell off the wire, and mcp_jobs resource caps) are
# gated behind `-F mcp`, so the default `cargo test --workspace` above never runs
# them and `feature-matrix` only *builds* them. Test just this crate under `mcp`
# to enforce those trust boundaries continuously, without relinking the whole
# axum/rmcp tree that a full --all-features test run would (see AGENTS.md DoD).
test-mcp:
  stage: test
  extends:
    - .deny_warnings
    - .not_on_schedule
  script:
    - cargo test -p mtui-mcp -F mcp

coverage:
  stage: test
  extends: .not_on_schedule
  before_script:
    - *ssh_fixture
    - *svn_fixture
    - rustup component add llvm-tools-preview
    - cargo install cargo-llvm-cov --locked
  script:
    - cargo llvm-cov --workspace --cobertura --output-path coverage.cobertura.xml
    - cargo llvm-cov report --summary-only
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+(?:\.\d+)?)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml

# ─────────────────────────────────────────────────────────────────────────────
# Renovate (dependency automation; mtui-rs-f5u.8)
#
# Both jobs come from the upstream templates included at the top of this file.
# We override only what the gitlab.suse.de environment requires:
#   1. pull_policy: if-not-present  (runners forbid `always`)
#   2. SUSE Trust Root CA           (so Renovate's git can reach gitlab.suse.de)
#   3. rules: validator runs only on MRs that change .gitlab/renovate.json;
#      the full renovate run happens only on schedule.
#
# Activation requires three one-time UI steps (do these once, in the project
# settings — the files here are inert until then):
#   1. Create a project access token with `api` + `write_repository` scope,
#      store it as a MASKED + PROTECTED CI variable named RENOVATE_TOKEN.
#   2. Create a pipeline schedule (e.g. Mon + Thu) so the `renovate` job runs.
#   3. Add a github.com PAT as a MASKED + PROTECTED CI variable named
