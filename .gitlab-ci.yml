renovate-config-validator:
  stage: check
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    # Only when the renovate config itself changes; parallel with other checks.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - .gitlab/renovate.json
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - .gitlab/renovate.json
  image:
    name: ${CI_RENOVATE_IMAGE}
    pull_policy: if-not-present
  before_script: []

renovate:
  stage: deploy
  # Independent of the build/test jobs: an empty `needs` decouples this job from
  # stage ordering so it starts immediately, and the build/test jobs skip on
  # schedule pipelines anyway (see .not_on_schedule), so a dependency scan never
  # waits on — or triggers — a full workspace compile.
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  image:
    name: ${CI_RENOVATE_IMAGE}
    pull_policy: if-not-present
  variables:
    # Renovate's image runs as user `ubuntu`; $HOME is /home/ubuntu. Hardcoded
    # for robustness across renovate image upgrades.
    NODE_EXTRA_CA_CERTS: "/home/ubuntu/certs/gitlab-ca.crt"
    # github.com PAT for release/tags datasource lookups; raises the anonymous
    # 60 req/h rate limit. Provide GITHUB_COM_TOKEN as a masked + protected var.
    RENOVATE_GITHUB_COM_TOKEN: "$GITHUB_COM_TOKEN"
  before_script:
    - *renovate_suse_ca
