---
name: release
# yamllint disable-line rule:truthy
on:
  push:
    tags:
      # Version tags: v26.0.0, optionally with a pre-release suffix
      # (v26.0.0-rc1). The Rust project tags with a "v" prefix.
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      # required for `gh release create`
      contents: write
    env:
      TARGET: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6

      - name: Verify tag matches workspace version
        run: |
          pkg="$(sed -n 's/^version = "\(.*\)".*/\1/p' Cargo.toml | head -1)"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$pkg" != "$tag" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' != workspace version '$pkg'"
            exit 1
          fi

      - name: Add musl target
        run: rustup target add "$TARGET"

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binaries
        run: |
          cargo build --release --target "$TARGET" -p mtui-cli
          cargo build --release --target "$TARGET" -p mtui-mcp --features mcp

      - name: Package release tarball
        run: cargo xtask package --version "$GITHUB_REF_NAME" --target "$TARGET"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          dist/release/*
