---
name: ci
on:
  push:
    branches: [main]
    tags: ['**']
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only PR runs are cancelled by a newer push; a main/tag run must finish
  # so its Codecov upload lands (PR comparisons need the main baseline).
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
env:
  CARGO_TERM_COLOR: always
jobs:
  fmt:
    runs-on: ubuntu-latest
    name: MTUI format
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
  clippy:
    runs-on: ubuntu-latest
    name: MTUI lint
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Install clippy
        run: rustup component add clippy
      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
  feature-matrix:
    runs-on: ubuntu-latest
    name: MTUI feature matrix (compile-only)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: Build with no default features
        run: cargo build --workspace --no-default-features
      - name: Build with all features
        run: cargo build --workspace --all-features
  test:
    runs-on: ubuntu-latest
    name: MTUI tests
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      # The SSH integration suite authenticates the client from an identity file;
      # the in-process fixture accepts any key but the runner ships none. Generate
      # a throwaway ed25519 key so the pubkey path is exercised.
      - name: SSH fixture
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519 -q
      # `svn` is a runtime dependency; a few tests drive a local file:// repo and
      # skip cleanly when absent, so install it to keep those paths covered.
      - name: SVN fixture
        run: sudo apt-get update -qq && sudo apt-get install -y -qq subversion
      - name: Build tests
        run: cargo build --workspace
      - name: Run tests (default features)
        run: cargo test --workspace
      # mtui-mcp's server/transport tests are gated behind `-F mcp`, so the
      # default workspace test run never exercises them.
      - name: Run mtui-mcp tests
        run: cargo test -p mtui-mcp -F mcp
  coverage:
    runs-on: ubuntu-latest
    name: MTUI coverage
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
      - name: SSH fixture
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N "" -f ~/.ssh/id_ed25519 -q
      - name: SVN fixture
        run: sudo apt-get update -qq && sudo apt-get install -y -qq subversion
      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
