---
name: ci
# yamllint disable-line rule:truthy
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    name: MTUI lint + format
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "--version"
      - name: Check ruff style 
        run: ruff format --check --diff ./mtui
      - name: Check ruff lint
        run: ruff check --diff ./mtui
  typecheck:
    runs-on: ubuntu-latest
    name: MTUI typecheck
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra norpm --group dev
      - name: Run ty check
        run: uv run ty check
  test:
    runs-on: ubuntu-latest
    name: MTUI tests + coverage
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra norpm --group dev
      - name: Test run ${{ matrix.python-version }}
        run: uv run pytest -v --cov=./mtui --cov-report=xml --cov-report=term --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@v5
        if: ${{ matrix.python-version == '3.13' }} 
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to CodeCov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }} 
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
