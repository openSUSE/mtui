---
name: ci
# yamllint disable-line rule:truthy
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    name: MTUI lint + format
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b  # v4.0.0
        with:
          args: "--version"
      - name: Check ruff style
        run: ruff format --check --diff .
      - name: Check ruff lint
        run: ruff check --diff .
  typecheck:
    runs-on: ubuntu-latest
    name: MTUI typecheck
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra norpm --extra mcp --group dev
      - name: Run ty check
        run: uv run ty check
  test:
    runs-on: ubuntu-latest
    name: MTUI tests + coverage
    strategy:
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --extra norpm --extra mcp --group dev
      - name: Test run ${{ matrix.python-version }}
        run: uv run pytest -v --cov=./mtui --cov-report=xml --cov-report=term --junitxml=junit.xml -o junit_family=legacy
      - name: Upload coverage to CodeCov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        if: ${{ matrix.python-version == '3.14' }} 
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to CodeCov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7
        if: ${{ !cancelled() }} 
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
