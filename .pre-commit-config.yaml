# Rust-native pre-commit hooks mirroring the CI `check` stage. Install with
# `pre-commit install`; run against everything with `pre-commit run --all-files`.
# Renovate's `pre-commit` manager keeps the (none-currently-remote) revs fresh.
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all --check
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
