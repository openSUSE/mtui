# Rust-native pre-commit hooks mirroring the CI `check` stage. Install with
# `pre-commit install`; run against everything with `pre-commit run --all-files`.
# All hooks are `repo: local` (no pinned remote revs), so Renovate's pre-commit
# manager has nothing to update and is intentionally left disabled in
# .gitlab/renovate.json. If a remote hook repo is added here, re-enable it there.
repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt --all --check
        entry: cargo fmt --all --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy --workspace --all-targets -- -D warnings
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
