[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mtui"
dynamic = ["version"]
description = "Maintenance Test Update Installer"
readme = "README.rst"
authors = [
    {name = "Christian Kornacker", email = "ckornacker@suse.de"}
]
maintainers = [
    {name = "SUSE QA Maintenance", email = "qa-maintenance@suse.de"}
]
license = "GPL-2.0-only"
keywords = ["SUSE", "Maintenance", "update", "testing"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Operating System :: POSIX :: Linux",
    "Environment :: Console"
]
dependencies = [
    "paramiko",
    "pyxdg",
    "ruamel.yaml",
    "requests",
    "rpm",
    "looseversion",
    "openqa-client"
]

[project.optional-dependencies]
keyring = ["keyring"]
norpm = ["version_utils"]
notify = ["notify"]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "coverage",
    "responses",
    "ruff",
    "ty"
]

[project.scripts]
mtui = "mtui.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["mtui*"]
exclude = [
    "*.tests",
    "*.tests.*", 
    "tests.*",
    "tests"
]

[tool.setuptools.package-data]
mtui = [
    "terms/*",
    "scripts/*",
    "helper/*",
    "Documentation/*",
    "*.rst",
]

[tool.setuptools.dynamic]
version = {attr = "mtui.__version__"}
