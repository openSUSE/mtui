[project]
name = "mtui"
description = "Maintenance Test Update Installer"
readme = "README.rst"
license = "GPL-2.0-only"
authors = [{ name = "Christian Kornacker", email = "ckornacker@suse.de" }]
maintainers = [
  { name = "SUSE QA Maintenance", email = "qa-maintenance@suse.de" }
]
keywords = ["Maintenance", "SUSE", "testing", "update"]
classifiers = [
  "Environment :: Console",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11"
]
dependencies = [
  "looseversion",
  "openqa-client",
  "paramiko",
  "pyxdg",
  "requests",
  "rpm",
  "ruamel.yaml"
]
dynamic = ["version"]

[project.scripts]
mtui = "mtui.main:main"

[project.optional-dependencies]
keyring = ["keyring"]
norpm = ["version_utils"]
notify = ["notify"]

[dependency-groups]
dev = ["coverage", "pytest", "pytest-cov", "responses", "ruff", "ty"]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["mtui*"]
exclude = ["*.tests", "*.tests.*", "tests.*", "tests"]

[tool.setuptools.package-data]
mtui = [
  "terms/*",
  "scripts/*",
  "helper/*",
  "Documentation/*",
  "*.rst",
]

[tool.setuptools.dynamic]
version = { attr = "mtui.__version__" }
